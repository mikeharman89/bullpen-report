
name: Weekly Bullpen Update

on:
  schedule:
    # 1pm MST Monday = 8pm UTC Monday (MST is UTC-7)
    - cron: '0 20 * * 1'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly data pipeline
        run: python pipeline.py

      - name: Commit and push updated data
        run: |
          git config user.name  "Bullpen Tracker Bot"
          git config user.email "bot@bullpen-tracker.com"
          git add data/
          git diff --staged --quiet || git commit -m "Weekly update — $(date '+%b %d, %Y')"
          git push
